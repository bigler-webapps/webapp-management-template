# Values file — example
#
# Copy this file to secrets.values.yaml (gitignored) and fill in real values.
# Structure: top-level `targets` mapping, one entry per target name in inventory.
#
# Used by `sync-secrets --secret-source yaml --values-file secrets.values.yaml`
# to populate GitHub Environment Secrets.

targets:

  production:
    # --- Server access ---
    SSH_HOST: "203.0.113.10"
    SSH_USER: "deploy"
    SSH_PRIVATE_KEY: |
      -----BEGIN OPENSSH PRIVATE KEY-----
      b3BlbnNzaC1rZXktdjEAAAAABG5vbmUAAAAEbm9uZQAAAAAAAAABAAAAMwAAAAtzc2gtZW
      ...replace with your real key...
      -----END OPENSSH PRIVATE KEY-----
    SSH_PRIVATE_KEY_ROOT: |
      -----BEGIN OPENSSH PRIVATE KEY-----
      ...replace with your real root bootstrap key...
      -----END OPENSSH PRIVATE KEY-----

    # --- Backup (Backblaze B2) ---
    RESTIC_REPO_B2: "s3:s3.eu-central-003.backblazeb2.com/your-bucket-name"
    RESTIC_PASSWORD: "generate-with-openssl-rand-hex-32"
    B2_KEY_ID: "K001abc..."
    B2_APP_KEY: "K001def..."

    # --- Traefik / Infrastructure ---
    ACME_EMAIL: "you@example.com"
    DOMAIN_KUMA: "kuma.example.com"
    # Traefik web dashboard disabled by default. Add TRAEFIK_DASHBOARD_AUTH +
    # DOMAIN_TRAEFIK only when activating via docs/DASHBOARD.md.

  # --- Optional second target ---
  # staging:
  #   SSH_HOST: "203.0.113.11"
  #   ...
