# Project config for generate-env
#
# This file is read by `generate-env` inside the deploy-traefik workflow.
# It defines the project name, container prefixes, and per-environment metadata
# (domains, IPs) that get rendered into the .env file consumed by docker compose.

project_name: "infrastructure"
container_prefix: "infra"

environments:

  production:
    use_traefik: true
    # List the public domains you'll route to via Traefik.
    # Variable mapping (DOMAIN_KUMA) happens via secrets, not here.
    domains:
      - "traefik.example.com"
      - "kuma.example.com"
    # Public IP of this server. Used for MASTER_PUBLIC_IP.
    master_public_ip: "203.0.113.10"

