# Traefik dynamic middlewares
#
# Loaded by the file provider — changes here are picked up at runtime.

http:
  middlewares:

    # Rate limit for the Traefik dashboard. Adjust burst/average to taste.
    dashboard-ratelimit:
      rateLimit:
        average: 5
        burst: 10
        period: 1m

    # OPTIONAL — uncomment and adapt CIDR if you adopt a VPN (Tailscale/WireGuard).
    # Then add `vpn-only@file` to your route middlewares list.
    # vpn-only:
    #   ipWhiteList:
    #     sourceRange:
    #       - "100.64.0.0/10"   # Tailscale CGNAT range
    #       # - "10.10.0.0/24"  # Example WireGuard subnet
