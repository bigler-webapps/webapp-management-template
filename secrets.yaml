# Secrets Schema — committed to Git
#
# This file declares which secrets exist. It does NOT contain real values.
# Real values live in secrets.values.yaml (gitignored).
#
# Workflow:
#   - Edit this file to add/remove secret keys
#   - Maintain secrets.values.yaml locally with real values per target
#   - Run sync-secrets to push values to GitHub Environment Secrets:
#       sync-secrets --target github \
#                    --secret-source yaml \
#                    --values-file secrets.values.yaml \
#                    --secret-target production
#
# If you adopt a vault later (Proton, Bitwarden, etc.), add `source:` or
# `source_template:` fields here and switch --secret-source to proton or auto.

config:
  # Default target used when --secret-target is not passed.
  default_target: production

  # Repo to receive GitHub Environment Secrets.
  # Replace with your fork.
  target_repo: "YOUR-ORG/YOUR-INFRA-REPO"

  # Path to inventory (used to resolve github_environment per target).
  inventory_path: "inventory/inventory.yaml"

secrets:
  # --- Server access ---
  SSH_HOST:
    # No `source:` here means: in yaml-mode, value comes from secrets.values.yaml.
    # In proton-mode (if adopted), add `source_template: "proton://..."` here.
    {}
  SSH_USER:
    {}
  SSH_PRIVATE_KEY:
    {}
  SSH_PRIVATE_KEY_ROOT:
    # Only used during initial provisioning. Mark exclude_from_env so it never
    # leaks into runtime .env files.
    exclude_from_env: true

  # --- Backup (Backblaze B2) ---
  RESTIC_REPO_B2:
    {}
  RESTIC_PASSWORD:
    # NEVER rotate. Loss = loss of all backups. Back this up offline.
    {}
  B2_KEY_ID:
    {}
  B2_APP_KEY:
    {}

  # --- Traefik / Infrastructure ---
  ACME_EMAIL:
    {}
  DOMAIN_KUMA:
    {}
  # Traefik web dashboard disabled by default. See docs/DASHBOARD.md to enable
  # it; the activation guide explains the secrets you need to add.

  # --- Add your app-specific secrets here ---
  # DJANGO_SECRET_KEY: {}
  # DB_PASSWORD: {}
