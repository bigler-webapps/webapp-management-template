# Secrets Schema — committed to Git
#
# This file declares which secrets exist. It does NOT contain real values.
# Real values are pulled from Proton Pass via sync-secrets.
#
# Proton paths: proton://YOUR-VAULT-NAME/ITEM-NAME/FIELD-NAME
# Replace YOUR-VAULT with your actual Proton Pass vault name.
# exclude_from_env: true means secret goes to GitHub Secrets only, not .env.local
#
# Workflow:
#   - Edit this file to add/remove secret keys
#   - Run sync-secrets to push values to GitHub Environment Secrets:
#       sync-secrets --server \
#                    --secret-source proton \
#                    --secret-target production

config:
  # Default target used when --secret-target is not passed.
  default_target: production

  # Repo to receive GitHub Environment Secrets.
  # Replace with your fork.
  target_repo: "YOUR-ORG/YOUR-INFRA-REPO"

  # Path to inventory (used to resolve github_environment per target).
  inventory_path: "inventory/inventory.yaml"

secrets:
  # --- Per-server connectivity (Tailscale-SSH; no key-based SSH login) ---
  # SSH_HOST, SSH_USER, SSH_PRIVATE_KEY, SSH_PRIVATE_KEY_ROOT removed:
  # provisioning connects as the `provision` user via Tailscale-SSH keyless.

  TAILSCALE_AUTH_KEY:
    source_template: "proton://YOUR-VAULT/tailscale/auth-key-{target}"
    exclude_from_env: true
    dev_default: ""

  CLOUDFLARE_TUNNEL_TOKEN:
    source_template: "proton://YOUR-VAULT/cloudflare/tunnel-token-{target}"
    exclude_from_env: true
    dev_default: ""

  # --- Backup (Backblaze B2) ---
  RESTIC_REPO_B2:
    source_template: "proton://YOUR-VAULT/server-{target}/restic_repo"
    dev_default: ""
  RESTIC_PASSWORD:
    # NEVER rotate. Loss = loss of all backups. Back this up offline.
    source_template: "proton://YOUR-VAULT/server-{target}/restic_password"
    dev_default: ""
  B2_KEY_ID:
    source_template: "proton://YOUR-VAULT/server-{target}/b2_key_id"
    dev_default: ""
  B2_APP_KEY:
    source_template: "proton://YOUR-VAULT/server-{target}/b2_app_key"
    dev_default: ""

  # --- Cross-server restore (repo-scoped transport key) ---
  CROSS_SERVER_TRANSPORT_KEY:
    source: "proton://YOUR-VAULT/cross-server-restore/transport_key"
    target_scope: repo
    exclude_from_env: true
    dev_default: ""

  # --- Cloudflare API ---
  CLOUDFLARE_API_TOKEN:
    source: "proton://YOUR-VAULT/cloudflare/api-token"
  CLOUDFLARE_ACCESS_API_TOKEN:
    source: "proton://YOUR-VAULT/cloudflare/access-api-token"
  CLOUDFLARE_ACCOUNT_ID:
    source: "proton://YOUR-VAULT/cloudflare/account-id"

  # --- CI Tokens (Tailscale OAuth: shared deploy client + dedicated provision client) ---
  TS_OAUTH_CLIENT_ID:
    source: "proton://YOUR-VAULT/ci-tokens/ts_oauth_client_id"
  TS_OAUTH_SECRET:
    source: "proton://YOUR-VAULT/ci-tokens/ts_oauth_secret"
  TS_PROVISION_OAUTH_CLIENT_ID:
    source: "proton://YOUR-VAULT/ci-tokens/ts_provision_oauth_client_id"
  TS_PROVISION_OAUTH_SECRET:
    source: "proton://YOUR-VAULT/ci-tokens/ts_provision_oauth_secret"

  # --- Infrastructure / Traefik ---
  TRAEFIK_DASHBOARD_AUTH:
    # htpasswd-format string. The bcrypt hash contains `$` signs that MUST be
    # escaped to `$$` in any values file — otherwise docker compose treats
    # them as variable references.
    source: "proton://YOUR-VAULT/traefik/dashboard_auth"
    dev_default: "admin:md5-dummy"
  # ACME_EMAIL: NOT USED -- TLS via Cloudflare Origin Certificates. See docs/ONBOARDING.md A.7
  DOMAIN_TRAEFIK:
    source_template: "proton://YOUR-VAULT/server-{target}/domain_traefik"
    dev_default: "traefik.example.com"
  DOMAIN_KUMA:
    source_template: "proton://YOUR-VAULT/server-{target}/domain_kuma"
    dev_default: "status.example.com"

  # --- Cloudflare Origin Certificates (per domain; written to certs/ by deploy role) ---
  # Add one pair per domain. Naming convention: ORIGIN_CERT_<DOMAIN_SLUG> / ORIGIN_KEY_<DOMAIN_SLUG>
  ORIGIN_CERT_EXAMPLE_COM:
    source: "proton://YOUR-VAULT/origin-certs/example-com-cert"
    exclude_from_env: true
  ORIGIN_KEY_EXAMPLE_COM:
    source: "proton://YOUR-VAULT/origin-certs/example-com-key"
    exclude_from_env: true

  # --- Uptime Kuma automation ---
  # Mark exclude_from_env so they don't leak into runtime .env files.
  KUMA_URL:
    source: "proton://YOUR-VAULT/monitoring/kuma_url"
    exclude_from_env: true
    dev_default: ""
  KUMA_AUTOMATION_USER:
    source: "proton://YOUR-VAULT/monitoring/kuma_automation_user"
    exclude_from_env: true
    dev_default: ""
  KUMA_AUTOMATION_PASSWORD:
    source: "proton://YOUR-VAULT/monitoring/kuma_automation_password"
    exclude_from_env: true
    dev_default: ""
  DISCORD_WEBHOOK_URL:
    source: "proton://YOUR-VAULT/monitoring/discord_webhook_url"
    exclude_from_env: true
    dev_default: ""

  # --- Kuma sync (repo-scoped; used by kuma-sync.yml which has no `environment:`) ---
  KUMA_SYNC_APP_ID:
    source: "proton://YOUR-VAULT/github/kuma_sync_app_id"
    target_scope: repo
    exclude_from_env: true
  KUMA_SYNC_APP_PRIVATE_KEY:
    source: "proton://YOUR-VAULT/github/kuma_sync_app_private_key"
    target_scope: repo
    exclude_from_env: true

  # --- Self-hosted GitHub Runner (GitHub App + mgmt Tailnet key) ---
  # Sync with: sync-secrets --secret-target runners --github-environment runners
  GH_RUNNER_APP_ID:
    source: "proton://YOUR-VAULT/github/github_runner_app_id"
  GH_RUNNER_APP_INSTALLATION_ID:
    source: "proton://YOUR-VAULT/github/github_runner_installation_id"
  GH_RUNNER_APP_PRIVATE_KEY:
    source: "proton://YOUR-VAULT/github/github_runner_private_key"
    exclude_from_env: true
  GH_RUNNER_SHA256:
    source: "proton://YOUR-VAULT/github/github_runner_sha_256"
  TAILSCALE_MGMT_AUTH_KEY:
    source: "proton://YOUR-VAULT/ci-tokens/tailscale_mgmt_auth_key"

  # --- Terraform Cloud ---
  TF_CLOUD_TOKEN:
    source: "proton://YOUR-VAULT/terraform-cloud/api_token"

  # --- Add your app-specific secrets here ---
  # DJANGO_SECRET_KEY: {}
  # DB_PASSWORD: {}
