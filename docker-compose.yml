# Traefik infrastructure stack — minimal viable
#
# Includes:
#   - Traefik v3.6 (reverse proxy, Cloudflare Origin Certs, web dashboard via CF Access)
#   - Uptime Kuma (heartbeat monitoring)
#   - Cloudflare Tunnel (outbound CF edge connection)
#   - Two docker-socket-proxy instances (one for Traefik, one for Autoheal)
#   - Autoheal (automatic restart of unhealthy containers)
#   - Claude Relay (Kuma webhook -> Claude Routine forwarding with Docker log enrichment)
#
# NOT included (intentionally minimal — add later if you adopt them):
#   - WireGuard (replaced by Tailscale on host; see ARCHITECTURE.md).
#     If you do add WireGuard back: serve split-DNS to clients via CoreDNS
#     inside the linuxserver/wireguard container — mount a Corefile that
#     resolves VPN-only hostnames (e.g. Traefik dashboard, Uptime Kuma) to
#     the Traefik container's internal Docker IP. This avoids Docker's
#     hairpin-NAT limitation when clients route the host's public IP
#     through the tunnel. See webapp-management's docker-compose.yml and
#     wireguard/Corefile for the pattern.
#   - traefik-cert-dumper (only needed if your apps consume Traefik-issued certs)
#   - vpn-only middleware (depends on VPN being set up)
#
# Before first deploy:
#   docker network create traefik_proxy
# (Required because the network is declared external: true.)
#
# Dashboard secret format: see secrets.values.example.yaml — `$$` escape is
# REQUIRED in the bcrypt hash. See docs/DASHBOARD.md for troubleshooting.

services:
  traefik:
    image: traefik:v3.7
    container_name: traefik
    profiles: ["main", "staging", "monitoring"]
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
      - "443:443"
    environment:
      - TRAEFIK_DASHBOARD_AUTH=${TRAEFIK_DASHBOARD_AUTH}
      - DOCKER_HOST=tcp://docker-socket-proxy-traefik:2375
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./acme.json:/acme.json
      - ./dynamic:/etc/traefik/dynamic:ro
      - ./certs:/etc/traefik/certs:ro
    networks:
      - proxy
    command:
      - "--log.level=INFO"
      - "--providers.docker=true"
      - "--providers.docker.endpoint=tcp://docker-socket-proxy-traefik:2375"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=traefik_proxy"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      # Entrypoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls.options=default"
      # Trust X-Forwarded-* only from the traefik_proxy bridge subnet (internal hops).
      # Only set on websecure; web entrypoint only redirects to websecure and never serves middleware-protected routes.
      - "--entrypoints.websecure.forwardedHeaders.trustedIPs=192.168.220.0/24"
      # SSL via Let's Encrypt TLS-ALPN challenge
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.myresolver.acme.storage=/acme.json"
      # Access logs to stdout so log collectors pick them up via Docker socket.
      - "--accesslog=true"
      # Dashboard (secured below via CF Access + rate-limit + sec-headers)
      - "--api.dashboard=true"
    labels:
      - "traefik.enable=true"
      # Global security headers middleware (also referenced by app routers)
      - "traefik.http.middlewares.sec-headers.headers.stsSeconds=15552000"
      - "traefik.http.middlewares.sec-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.sec-headers.headers.stsPreload=true"
      - "traefik.http.middlewares.sec-headers.headers.customResponseHeaders.X-Frame-Options=SAMEORIGIN"
      - "traefik.http.middlewares.sec-headers.headers.customResponseHeaders.X-Content-Type-Options=nosniff"
      - "traefik.http.middlewares.sec-headers.headers.customResponseHeaders.Referrer-Policy=strict-origin-when-cross-origin"
      # BasicAuth middleware definition kept as rollback option — NOT wired to
      # the dashboard router. Auth layer is CF Access. To reinstate BasicAuth:
      # append `,traefik-auth` to the middlewares line below.
      - "traefik.http.middlewares.traefik-auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH}"
      # Dashboard router
      # NOTE: Auth via CF Access -- traefik-auth kept as rollback middleware, not wired
      - "traefik.http.routers.traefik-dashboard.rule=Host(`${DOMAIN_TRAEFIK}`) && (PathPrefix(`/api`) || PathPrefix(`/dashboard`))"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=myresolver"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.middlewares=sec-headers,dashboard-ratelimit@file"
      # Sync rate-limit middleware (used by webhook/sync endpoints)
      - "traefik.http.middlewares.sync-limit.ratelimit.average=50"
      - "traefik.http.middlewares.sync-limit.ratelimit.burst=100"

  uptime-kuma:
    image: louislam/uptime-kuma:2
    container_name: uptime-kuma
    profiles: ["monitoring"]
    restart: unless-stopped
    volumes:
      - ./uptime-kuma-data:/app/data
    networks:
      - proxy
    # When Kuma monitors apps hosted on the SAME server, Docker's hairpin-NAT
    # prevents the container from reaching the host's public IP. Add each
    # monitored hostname as an extra_host mapping to the Traefik container so
    # Kuma → Traefik → backend works locally. Adjust the IP if your Docker
    # bridge subnet differs (`docker network inspect traefik_proxy`).
    #
    # extra_hosts:
    #   - "yourapp.example.com:192.168.220.2"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kuma.rule=Host(`${DOMAIN_KUMA}`)"
      - "traefik.http.routers.kuma.entrypoints=websecure"
      - "traefik.http.routers.kuma.tls.certresolver=myresolver"
      # NOTE: minimal viable exposes Kuma to the internet behind its own auth.
      # If you adopt VPN later, add `vpn-only@file` to restrict.
      # kuma-ratelimit caps brute-force attempts against Kuma's built-in login;
      # keyed on CF-Connecting-IP so each real client gets its own bucket.
      - "traefik.http.middlewares.kuma-ratelimit.ratelimit.average=60"
      - "traefik.http.middlewares.kuma-ratelimit.ratelimit.burst=30"
      - "traefik.http.middlewares.kuma-ratelimit.ratelimit.period=1m"
      - "traefik.http.middlewares.kuma-ratelimit.ratelimit.sourceCriterion.requestHeaderName=Cf-Connecting-Ip"
      - "traefik.http.routers.kuma.middlewares=sec-headers,kuma-ratelimit"
      - "traefik.http.services.kuma.loadbalancer.server.port=3001"

  # Cloudflare Tunnel — outbound connection to CF edge, routes app hostnames.
  # Token injected via secrets.yaml -> .env from secret store.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    profiles: ["main", "staging", "monitoring"]
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - proxy

  # Socket Proxy for Traefik (read-only docker.sock exposure).
  docker-socket-proxy-traefik:
    image: tecnativa/docker-socket-proxy:v0.4.2
    container_name: docker-socket-proxy-traefik
    profiles: ["main", "staging", "monitoring"]
    restart: unless-stopped
    environment:
      CONTAINERS: "1"
      EVENTS: "1"
      NETWORKS: "1"
      INFO: "1"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy

  # Socket Proxy for Autoheal (write access via API, NOT direct socket mount).
  # autoheal needs CONTAINERS=1 + POST=1 (POST /containers/{id}/restart).
  # The proxy restricts the rest of the Docker API surface.
  docker-socket-proxy-autoheal:
    image: tecnativa/docker-socket-proxy:v0.4.2
    container_name: docker-socket-proxy-autoheal
    profiles: ["main", "staging"]
    restart: unless-stopped
    environment:
      CONTAINERS: "1"
      POST: "1"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - autoheal-net

  # Autoheal: automatically restarts unhealthy containers.
  # LABEL-based opt-in via `autoheal=true` label on app containers.
  autoheal:
    image: willfarrell/autoheal
    container_name: autoheal
    profiles: ["main", "staging"]
    restart: unless-stopped
    depends_on:
      - docker-socket-proxy-autoheal
    environment:
      # "label" = only watch containers with label `autoheal=true`.
      AUTOHEAL_CONTAINER_LABEL: "autoheal"
      AUTOHEAL_INTERVAL: "10"
      AUTOHEAL_START_PERIOD: "60"
      AUTOHEAL_DEFAULT_STOP_TIMEOUT: "10"
      # Route Docker API through TCP socket proxy instead of direct socket mount.
      DOCKER_SOCK: "tcp://docker-socket-proxy-autoheal:2375"
    networks:
      - autoheal-net

  # Watchtower has been retired. Image updates are driven by Renovate (pin-bump
  # PRs against this repo) rather than by host-side auto-pulls. With pinned
  # tags + Renovate the previous watchtower setup was a no-op anyway.

  # ── Kuma -> Claude Relay ─────────────────────────────────────────────────
  # Receives Kuma webhooks (DOWN events), enriches them with Docker logs, and
  # forwards them to the Claude Code Kuma-Alert-Routine.
  #
  # Reachable via Tailscale Serve:
  #   https://<server>.<your-tailnet>.ts.net:8090/webhook
  # Kuma notification: claude-relay-<server> in monitoring/notifications.yml
  #
  # Secrets in .env (via sync-secrets from your secret store):
  #   CLAUDE_ROUTINE_ENDPOINT -- API URL of the Kuma-Alert Routine
  #   CLAUDE_ROUTINE_TOKEN    -- Bearer token (sk-ant-oat01-...)
  #
  # Runs on staging AND all production servers. Each instance fetches logs
  # from its own local Docker daemon.
  # Mitigations:
  #   - Socket-proxy gating: CONTAINERS=1 + LOGS=1 only (no write access)
  #   - S33: pin Dockerfile.relay digest once first build digest is known
  docker-socket-proxy-relay:
    image: tecnativa/docker-socket-proxy:v0.4.2@sha256:bd2241b3bec83abcff25927a0a7ae518e0c5bef624b3cc247dcb31e68b53f417
    container_name: docker-socket-proxy-relay
    profiles: ["staging", "main"]
    restart: unless-stopped
    environment:
      CONTAINERS: "1"
      LOGS: "1"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - relay-net

  claude-relay:
    build:
      context: ./monitoring
      dockerfile: Dockerfile.relay
    container_name: claude-relay
    profiles: ["staging", "main"]
    restart: unless-stopped
    depends_on:
      - docker-socket-proxy-relay
    ports:
      - "127.0.0.1:8091:8090"
    environment:
      - CLAUDE_ROUTINE_ENDPOINT=${CLAUDE_ROUTINE_ENDPOINT}
      - CLAUDE_ROUTINE_TOKEN=${CLAUDE_ROUTINE_TOKEN}
    networks:
      - relay-net

networks:
  proxy:
    name: traefik_proxy
    external: true
  autoheal-net:
    # Internal-only network: autoheal + docker-socket-proxy-autoheal talk to
    # each other over TCP, no external routes.
    internal: true
  relay-net:
    # Bridge network: claude-relay + docker-socket-proxy-relay.
    # Not internal: claude-relay needs internet access for the Claude API
    # and host port binding for Kuma webhooks. Security via UFW (port 8090
    # restricted to Tailscale CIDR) and docker-socket-proxy (CONTAINERS+LOGS only).
