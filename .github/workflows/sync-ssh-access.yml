name: Sync SSH Access

# DEPRECATED 2026-05-24 — use `ansible-provision.yml` instead.
#
# Key-Sync is integrated into the canonical Ansible playbook's pre/post tasks
# (see S182 / SECURITY_FINDINGS in the platform reference). Run
# `ansible-provision.yml` against the target host and the keys converge
# alongside the rest of server state.
#
# Syncs managed public keys from access/ to authorized_keys on the target server.
# Reads root keys from access/root/*.pub and deploy keys from access/deploy/*.pub.

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Target environment from inventory.yaml"
        required: true
        type: environment
      target_host:
        description: "Optional host override (uses SSH_HOST secret if empty)"
        required: false
        type: string
      deploy_user:
        description: "Deploy user whose authorized_keys is managed"
        required: false
        type: string
        default: "deploy"
      preserve_existing_root_keys:
        description: "Keep existing root keys instead of replacing them"
        required: false
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: ${{ inputs.target }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Sync SSH access keys
        uses: bigler-webapps/workflow-templates/.github/actions/sync-ssh-access@v2.0.3
        with:
          target: ${{ inputs.target }}
          target_host: ${{ inputs.target_host }}
          ssh_host: ${{ secrets.SSH_HOST }}
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY_ROOT }}
          deploy_user: ${{ inputs.deploy_user }}
          preserve_existing_root_keys: ${{ inputs.preserve_existing_root_keys }}
