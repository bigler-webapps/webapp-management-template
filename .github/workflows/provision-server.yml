name: Provision Server

# Bootstrap a server (packages, Docker, deploy user, dirs, firewall, fail2ban).
# Runs as root via SSH_PRIVATE_KEY_ROOT.
#
# WARNING: This workflow installs packages, enables UFW (deny incoming), and
# restarts Docker. Do NOT run on a production server with live traffic without
# verifying UFW rules first and having a working break-glass path.

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Target environment from inventory.yaml"
        required: true
        type: environment
      server_ip:
        description: "Optional host override (uses SSH_HOST secret if empty)"
        required: false
        type: string
      deploy_user:
        description: "User that will own app deployments (default: from inventory or 'deploy')"
        required: false
        type: string

jobs:
  provision:
    runs-on: ubuntu-latest
    environment: ${{ inputs.target }}
    steps:
      - name: Checkout
        # TODO: pin to a specific SHA once you tag a release of this template
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Provision base server
        uses: bigler-webapps/workflow-templates/.github/actions/provision-server@v1.0.0
        with:
          target: ${{ inputs.target }}
          target_host: ${{ inputs.server_ip }}
          ssh_host: ${{ secrets.SSH_HOST }}
          ssh_private_key_root: ${{ secrets.SSH_PRIVATE_KEY_ROOT }}
          deploy_user: ${{ inputs.deploy_user }}
