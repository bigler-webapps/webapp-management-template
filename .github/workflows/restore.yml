name: Restore / Sync Data

# Restore an app DB from a restic snapshot.
# Production restore is a destructive operation — protected by the DESTROY-token
# preflight check. For additional gates, configure Required Reviewers on the
# target GitHub Environment in your repository settings.

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'GitHub environment / backup target'
        required: true
        type: environment
      app_name:
        description: 'App name (e.g. myapp, survey_app)'
        required: true
        type: string
      target_env:
        description: 'Wohin sollen die Daten? (staging, zip-file, production)'
        required: true
        type: string
        default: 'staging'
      snapshot_id:
        description: 'Snapshot ID (default: latest)'
        required: true
        default: 'latest'
      confirm_destroy:
        description: 'Type DESTROY to confirm production restore (ignored for non-prod)'
        required: false
        type: string

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Confirm production restore
        if: ${{ inputs.target_env == 'production' }}
        env:
          # S20: pass workflow_dispatch inputs through env to avoid Bash
          # template injection. `confirm_destroy` is a free-text input;
          # `target_env` is a free-text string (not a typed environment list).
          INPUT_CONFIRM_DESTROY: ${{ inputs.confirm_destroy }}
          INPUT_TARGET_ENV: ${{ inputs.target_env }}
        run: |
          if [ "$INPUT_CONFIRM_DESTROY" != "DESTROY" ]; then
            echo "❌ Production restore requires confirm_destroy=DESTROY"
            echo "   target_env=$INPUT_TARGET_ENV is irreversible — type DESTROY in the input."
            exit 1
          fi
          echo "✅ Production restore confirmed (DESTROY token provided)."

  prepare:
    needs: preflight
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - id: resolve
        shell: bash
        env:
          # S20: target is `type: environment` (GH validates against existing
          # environments) but still pass via env to avoid Bash template
          # interpolation; regex-validate as defence in depth.
          INPUT_TARGET: ${{ inputs.target }}
        run: |
          set -euo pipefail
          if ! [[ "$INPUT_TARGET" =~ ^[a-zA-Z0-9._-]+$ ]]; then
            echo "::error::invalid target value"
            exit 1
          fi
          M="$(python3 .github/scripts/resolve_inventory_targets.py --target "$INPUT_TARGET" --require-role restore)"
          echo "matrix=$M" >> "$GITHUB_OUTPUT"

  restore:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    environment: ${{ matrix.github_environment }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: ⬇️ Checkout webapp-ops-scripts
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          repository: bigler-webapps/webapp-ops-scripts
          path: ops-scripts

      - uses: bigler-webapps/workflow-templates/.github/actions/restore@v2.0.3
        with:
          target: ${{ matrix.target }}
          app_name: ${{ inputs.app_name }}
          target_env: ${{ inputs.target_env }}
          snapshot_id: ${{ inputs.snapshot_id }}
          # v2.0.0: Tailscale-SSH-only — no ssh_private_key.
          ssh_host: ${{ matrix.target }}.tail990d7f.ts.net
          ssh_user: deploy
          restic_repo_b2: ${{ secrets.RESTIC_REPO_B2 }}
          restic_password: ${{ secrets.RESTIC_PASSWORD }}
          b2_key_id: ${{ secrets.B2_KEY_ID }}
          b2_app_key: ${{ secrets.B2_APP_KEY }}
          ts_oauth_client_id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          ts_oauth_secret: ${{ secrets.TS_OAUTH_SECRET }}
          ops_scripts_path: ops-scripts
