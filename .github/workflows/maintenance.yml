name: Maintenance

# Weekly OS maintenance: apt updates, reboot if needed, container health check.

on:
  schedule:
    - cron: "30 3 * * 0"  # Sunday 03:30 UTC
  workflow_dispatch:
    inputs:
      target:
        description: "Target environment from inventory.yaml"
        required: true
        type: environment
      apply_updates:
        description: "Install apt updates before reboot decision"
        required: false
        type: boolean
        default: true
      force_reboot:
        description: "Force reboot even if /var/run/reboot-required is absent"
        required: false
        type: boolean
        default: false

jobs:
  maintenance:
    runs-on: ubuntu-latest
    environment: ${{ inputs.target || 'production' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Run maintenance
        uses: bigler-webapps/workflow-templates/.github/actions/maintenance@main
        with:
          target: ${{ inputs.target || 'production' }}
          ssh_host: ${{ secrets.SSH_HOST }}
          ssh_user: ${{ secrets.SSH_USER }}
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
          apply_updates: ${{ inputs.apply_updates || true }}
          force_reboot: ${{ inputs.force_reboot || false }}
          # TODO: tenant-specific - adapt to your container names
          expected_container_tokens_json: '["traefik"]'
