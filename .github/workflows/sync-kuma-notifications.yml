name: Sync Uptime Kuma Notifications

# Idempotently registers / updates the notification channels defined in
# monitoring/notifications.yml against your Uptime Kuma server.
#
# Run this once after initial Kuma setup, or after editing the config.
# It's safe to re-run — entries are matched by name.
#
# Prereqs: secrets KUMA_URL, KUMA_AUTOMATION_USER, KUMA_AUTOMATION_PASSWORD
# (and any per-channel secrets you reference in notifications.yml, e.g.
# DISCORD_WEBHOOK_URL).

on:
  workflow_dispatch:
    inputs:
      target:
        description: "GitHub environment / inventory target"
        required: true
        type: environment
      prune:
        description: "Delete Kuma notifications absent from the config"
        required: false
        default: false
        type: boolean

concurrency:
  group: kuma-notifications-${{ inputs.target }}
  cancel-in-progress: false

jobs:
  sync:
    # Skip on the template repo itself; tenant forks run normally.
    if: github.repository != 'bigler-webapps/webapp-management-template'
    runs-on: ubuntu-latest
    environment: ${{ inputs.target }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: bigler-webapps/workflow-templates/.github/actions/sync-kuma-notifications@main
        with:
          config_path: monitoring/notifications.yml
          ssh_host: ${{ secrets.SSH_HOST }}
          ssh_user: ${{ secrets.SSH_USER }}
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
          kuma_user: ${{ secrets.KUMA_AUTOMATION_USER }}
          kuma_password: ${{ secrets.KUMA_AUTOMATION_PASSWORD }}
          discord_webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          prune: ${{ inputs.prune && 'true' || 'false' }}
