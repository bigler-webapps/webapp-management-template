name: Terraform Plan

on:
  pull_request:
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-*.yml'

permissions:
  contents: read
  pull-requests: write   # für PR-Comment mit Plan-Output

jobs:
  plan:
    runs-on: ubuntu-latest
    environment: main-prod
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: bigler-webapps/workflow-templates/.github/actions/terraform-plan@v2.0.3
        with:
          tf_cloud_token: ${{ secrets.TF_CLOUD_TOKEN }}
          cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare_access_api_token: ${{ secrets.CLOUDFLARE_ACCESS_API_TOKEN }}
          cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
