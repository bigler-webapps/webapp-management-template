name: Backup

# Daily restic backups to Backblaze B2.
# Runs on schedule plus manual dispatch.

on:
  schedule:
    - cron: "25 2 * * *"  # 02:25 UTC daily
  workflow_dispatch:
    inputs:
      target:
        description: "Target environment from inventory.yaml"
        required: true
        type: environment
      sync_staging:
        description: "After backup, sync prod data to staging"
        required: false
        type: boolean
        default: false

jobs:
  backup:
    # Skip when running on the template repo itself (no secrets, no servers).
    # Tenant forks have a different repository name and run normally.
    if: github.repository != 'bigler-webapps/webapp-management-template'
    runs-on: ubuntu-latest
    environment: ${{ inputs.target || 'production' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Checkout webapp-ops-scripts
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: bigler-webapps/webapp-ops-scripts
          path: ops-scripts

      - name: Run backup
        uses: bigler-webapps/workflow-templates/.github/actions/backup@main
        with:
          target: ${{ inputs.target || 'production' }}
          sync_staging: ${{ inputs.sync_staging || false }}
          ssh_host: ${{ secrets.SSH_HOST }}
          ssh_user: ${{ secrets.SSH_USER }}
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
          restic_repo_b2: ${{ secrets.RESTIC_REPO_B2 }}
          restic_password: ${{ secrets.RESTIC_PASSWORD }}
          b2_key_id: ${{ secrets.B2_KEY_ID }}
          b2_app_key: ${{ secrets.B2_APP_KEY }}
