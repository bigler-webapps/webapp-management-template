name: Update Server

# Incremental, idempotent re-apply of server tuning and base tooling on an
# already-provisioned host. Safe to run on production — does NOT touch UFW,
# fail2ban core config, Docker, sudoers, or users.
#
# Use this whenever a new sysctl tuning or base package needs to land on an
# existing server, without rerunning the heavy provision-server workflow.

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Target environment from inventory.yaml"
        required: true
        type: environment
      server_ip:
        description: "Optional host override (uses SSH_HOST secret if empty)"
        required: false
        type: string

jobs:
  update:
    runs-on: ubuntu-latest
    environment: ${{ inputs.target }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Apply incremental server updates
        uses: bigler-webapps/workflow-templates/.github/actions/update-server@main
        with:
          target: ${{ inputs.target }}
          target_host: ${{ inputs.server_ip }}
          ssh_host: ${{ secrets.SSH_HOST }}
          ssh_private_key_root: ${{ secrets.SSH_PRIVATE_KEY_ROOT }}
