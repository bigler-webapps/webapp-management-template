name: Janitor

# Monthly lightweight cleanup and diagnostics:
# Docker prune, log cleanup, disk usage report.

on:
  schedule:
    - cron: "40 3 7 * *"  # 7th of month, 03:40 UTC
  workflow_dispatch:
    inputs:
      target:
        description: "Target environment from inventory.yaml"
        required: true
        type: environment

jobs:
  janitor:
    # Skip on the template repo itself; tenant forks run normally.
    if: github.repository != 'bigler-webapps/webapp-management-template'
    runs-on: ubuntu-latest
    environment: ${{ inputs.target || 'production' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Run janitor
        uses: bigler-webapps/workflow-templates/.github/actions/janitor@main
        with:
          target: ${{ inputs.target || 'production' }}
          ssh_host: ${{ secrets.SSH_HOST }}
          ssh_user: ${{ secrets.SSH_USER }}
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
