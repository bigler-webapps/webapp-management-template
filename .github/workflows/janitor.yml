name: Janitor

# Monthly lightweight cleanup and diagnostics:
# Docker prune, log cleanup, disk usage report.

on:
  schedule:
    - cron: "40 3 7 * *"  # 7th of month, 03:40 UTC
  workflow_dispatch:
    inputs:
      target:
        description: "Target environment from inventory.yaml"
        required: true
        type: environment

jobs:
  janitor:
    # Skip on the template repo itself; tenant forks run normally.
    if: github.repository != 'bigler-webapps/webapp-management-template'
    runs-on: ubuntu-latest
    environment: ${{ inputs.target || 'production' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Checkout webapp-ops-scripts
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: bigler-webapps/webapp-ops-scripts
          path: ops-scripts

      - name: Run janitor
        uses: bigler-webapps/workflow-templates/.github/actions/janitor@v2.0.0
        with:
          target: ${{ inputs.target || 'production' }}
          ssh_host: ${{ secrets.SSH_HOST }}
          ssh_user: ${{ secrets.SSH_USER }}
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
