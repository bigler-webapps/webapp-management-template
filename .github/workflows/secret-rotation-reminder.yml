name: Secret Rotation Reminder

# S188 + S190: there is no automatic secret-rotation cadence. This scheduled
# workflow opens a tracking issue every quarter with a rotation checklist, so
# rotation is a deliberate, auditable, recurring task (issue trail) rather than
# a forgotten one. The actual rotation stays manual: rotate at the provider ->
# update your password manager -> run `sync-secrets`. The workflow only reminds.

on:
  schedule:
    # 09:00 UTC on the 1st of Jan / Apr / Jul / Oct (quarterly).
    - cron: "0 9 1 1,4,7,10 *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Open rotation-reminder issue (skip if one is already open)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          LABEL="secret-rotation"

          # Avoid pile-up: if the previous reminder issue is still open
          # (un-actioned), do not create another one.
          existing=$(gh issue list --repo "$REPO" --state open --label "$LABEL" --json number --jq 'length')
          if [ "$existing" -gt 0 ]; then
            echo "An open '$LABEL' issue already exists — skipping creation."
            exit 0
          fi

          # Ensure the label exists (idempotent; ignore "already exists").
          gh label create "$LABEL" --repo "$REPO" --color "D93F0B" \
            --description "Recurring secret-rotation reminder (S188/S190)" 2>/dev/null || true

          TITLE="Secret rotation — $(date -u +%Y-%m-%d)"
          gh issue create --repo "$REPO" --label "$LABEL" --title "$TITLE" --body "$(cat <<'EOF'
          Quarterly secret-rotation reminder (S188 / S190). Rotation is manual and
          deliberate: **rotate at the provider -> update your password manager -> run `sync-secrets`**.
          Check off each item; close this issue when done.

          ### App secrets (per app — list your app names here)
          - [ ] `DJANGO_SECRET_KEY` — recommended **annually**. NOTE: rotating invalidates all active sessions/cookies (acceptable, expected).
          - [ ] OAuth provider secrets in use (`GOOGLE_SECRET`, `MICROSOFT_SECRET`) — per provider policy / on suspicion.

          ### Platform / Tailscale (webapp-management)
          - [ ] `TS_OAUTH_*` + `TS_PROVISION_OAUTH_*` (Tailscale OAuth clients) — **annually** or on operator change.
          - [ ] `CLOUDFLARE_API_TOKEN` / `CLOUDFLARE_ACCESS_API_TOKEN` — **annually**.
          - [ ] `B2_KEY_ID` / `B2_APP_KEY` (per server) — **annually**; see S36 re. read-only split.
          - [ ] `RESTIC_PASSWORD` — rotate only with a documented re-encrypt plan (rotating breaks access to existing snapshots).
          - [ ] `TAILSCALE_AUTH_KEY` (staging) — ephemeral; rotate on leak.

          ### How
          1. Rotate the value at the provider (Google/Microsoft/Cloudflare/Tailscale/Backblaze) or generate a new one.
          2. Update the value in your password manager (the source of truth).
          3. Run `sync-secrets` for the affected target(s) to push into GitHub Environment secrets.
          4. Trigger a deploy (or `ansible-provision`) so the new value takes effect; verify green.

          _Auto-opened by `.github/workflows/secret-rotation-reminder.yml`._
          EOF
          )"
          echo "Created rotation-reminder issue: $TITLE"
