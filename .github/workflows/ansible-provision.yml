name: Ansible Provision

# Canonical provision-AND-update path (2026-05-24+).
#
# `site.yml` is idempotent — running it against an existing server applies
# any new package / sysctl / config drift and is a safe no-op on
# already-applied state. This workflow therefore covers both fresh-host
# bootstrap AND incremental updates; the legacy `update-server.yml` workflow
# (deprecated 2026-05-24) is superseded by re-running this workflow.
#
# See SECURITY_FINDINGS.md S182 for the deprecation rationale (root-SSH
# removal from the `tag:ci-deploy` ACL).

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Ansible inventory limit (host or group, e.g. 'staging' or 'stage')"
        required: true
        type: environment
      extra_vars:
        description: "Ansible extra-vars (single-space-separated 'key=value' pairs, e.g. 'tailscale_force_up=true')"
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  provision:
    runs-on: ubuntu-latest
    environment: ${{ inputs.target }}
    defaults:
      run:
        working-directory: ansible
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Validate target input
        working-directory: .
        env:
          INPUT_TARGET: ${{ inputs.target }}
        run: |
          set -euo pipefail
          if ! printf '%s' "$INPUT_TARGET" | grep -qE '^[a-zA-Z0-9_-]+$'; then
            echo "❌ Invalid 'target' input"
            exit 1
          fi
          echo "✅ Target validated: $INPUT_TARGET"

      # Validate extra_vars BEFORE installing tooling so a bad input fails
      # fast and never reaches Ansible. Same env-var-quoting + strict-regex
      # pattern as Validate-target-input above (S20 hardening).
      - name: Validate extra_vars input
        working-directory: .
        env:
          INPUT_EXTRA_VARS: ${{ inputs.extra_vars }}
        run: |
          set -euo pipefail
          if [ -z "${INPUT_EXTRA_VARS}" ]; then
            echo "✅ extra_vars empty — skipping --extra-vars."
            exit 0
          fi
          # Single-space-separated 'key=value' pairs. Keys must be
          # ansible-compatible identifiers; values are restricted to
          # alphanumerics plus `. _ -` (hyphen at position 0 in the class
          # to avoid range-ambiguity for future editors).
          if ! printf '%s' "$INPUT_EXTRA_VARS" | grep -qE '^([A-Za-z_][A-Za-z0-9_]*=[-A-Za-z0-9._]+)( [A-Za-z_][A-Za-z0-9_]*=[-A-Za-z0-9._]+)*$'; then
            echo "❌ Invalid extra_vars (expected: single-space-separated 'key=value [key=value ...]')"
            exit 1
          fi
          echo "✅ extra_vars validated: $INPUT_EXTRA_VARS"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: pip install --no-cache-dir 'ansible-core>=2.16,<2.18'

      - name: Install collection requirements
        run: ansible-galaxy collection install -r requirements.yml

      # Fail fast with a clear message if the dedicated provisioning OAuth
      # secrets are missing in this environment (restores the explicit
      # emptiness guard the removed root-key step used to provide).
      - name: Validate provision OAuth secrets
        env:
          CID: ${{ secrets.TS_PROVISION_OAUTH_CLIENT_ID }}
          CSEC: ${{ secrets.TS_PROVISION_OAUTH_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${CID}" ] || [ -z "${CSEC}" ]; then
            echo "❌ TS_PROVISION_OAUTH_CLIENT_ID/SECRET not set in environment '${{ inputs.target }}'."
            exit 1
          fi
          echo "✅ Provision OAuth secrets present."

      # Runner joins the Tailnet so Ansible can resolve
      # <host>.tail990d7f.ts.net MagicDNS names and reach servers via
      # Tailscale SSH. OAuth credentials are per-environment secrets.
      - name: Join Tailnet
        uses: tailscale/github-action@6cae46e2d796f265265cfcf628b72a32b4d7cade  # v3.2.3
        with:
          # Dedicated provisioning OAuth client (tag:ci-provision only), isolated
          # from the tag:ci-deploy client used by app deploys. The tailnet ACL
          # maps tag:ci-provision -> tag:server-* as the `provision` user.
          oauth-client-id: ${{ secrets.TS_PROVISION_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_PROVISION_OAUTH_SECRET }}
          tags: tag:ci-provision
          version: "1.98.3"
          # Explicit valid DNS-label hostname: the runner's default hostname can
          # be an invalid label, making `tailscale up` flaky and leaving peer
          # connectivity unestablished (transient UNREACHABLE). run_id is numeric.
          hostname: gh-ci-provision-${{ github.run_id }}

      # Verify systemd-resolved routes .tail990d7f.ts.net through Tailscale's
      # MagicDNS server before Ansible tries to connect. Exits non-zero if the
      # domain is missing, which surfaces DNS misconfiguration early.
      - name: Verify MagicDNS routing
        run: |
          set -euo pipefail
          for i in 1 2 3 4 5; do
            if resolvectl domain | grep -q 'tail990d7f.ts.net'; then
              echo "✅ MagicDNS domain routed via systemd-resolved"
              exit 0
            fi
            echo "⏳ Waiting for MagicDNS routing ($i/5)..."
            sleep 2
          done
          echo "❌ MagicDNS domain not found in resolvectl domain output after 10 s"
          resolvectl domain || true
          resolvectl dns   || true
          exit 1

      # The ephemeral runner's WireGuard peer connectivity can lag the MagicDNS
      # routing check above by a few seconds. Wait until the target is reachable
      # before handing off to Ansible.
      - name: Wait for Tailnet peer connectivity
        env:
          LIMIT_TARGET: ${{ inputs.target }}
        run: |
          set -uo pipefail
          HOST="${LIMIT_TARGET}.tail990d7f.ts.net"
          for i in $(seq 1 15); do
            if tailscale ping --c 1 --timeout 2s "$HOST" >/dev/null 2>&1; then
              echo "✅ Tailnet peer reachable: $HOST"
              exit 0
            fi
            echo "⏳ Waiting for tailnet peer connectivity to $HOST ($i/15)..."
            sleep 2
          done
          echo "⚠️ $HOST not confirmed reachable after 30s — proceeding; Ansible will surface the real error."

      - name: Run Ansible playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          # Pass the target via env-var so the shell sees a quoted variable,
          # not a textually-substituted GitHub expression — keeps the
          # injection door closed even if the validation step above is
          # removed or reordered in the future.
          LIMIT_TARGET: ${{ inputs.target }}
          # Workflow-input passthrough for one-shot ansible extra-vars
          # (e.g. `tailscale_force_up=true` after changing tailscale-up
          # flags). Same env-var-quoting + regex validation (S20 hardening)
          # as LIMIT_TARGET above.
          EXTRA_VARS: ${{ inputs.extra_vars }}
          # Tailscale auth-key consumed by the biglerconsult.infra.tailscale
          # role via `lookup('env', 'TAILSCALE_AUTH_KEY')` in group_vars.
          # Only the `staging` environment is expected to have this secret
          # populated. For other targets where the secret is absent the
          # expression evaluates to empty, the role skips `tailscale up`,
          # and the host is NOT registered in the tailnet — that is the
          # safe fallback. CAVEAT: do not duplicate this secret into other
          # environments (e.g. main-prod) without intent; doing so would
          # auto-register that host into the same tailnet on the next run.
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
          # Runner-host secrets — only populated in the `runners` GitHub
          # Environment. For all other targets these evaluate to empty strings,
          # which is the safe fallback: the runner play only runs when
          # --limit includes the `runners` group, so empty values are never
          # consumed against non-runner hosts.
          TAILSCALE_MGMT_AUTH_KEY: ${{ secrets.TAILSCALE_MGMT_AUTH_KEY }}
          GH_RUNNER_APP_ID: ${{ secrets.GH_RUNNER_APP_ID }}
          GH_RUNNER_APP_INSTALLATION_ID: ${{ secrets.GH_RUNNER_APP_INSTALLATION_ID }}
          GH_RUNNER_APP_PRIVATE_KEY: ${{ secrets.GH_RUNNER_APP_PRIVATE_KEY }}
          GH_RUNNER_SHA256: ${{ secrets.GH_RUNNER_SHA256 }}
        run: |
          set -euo pipefail
          # Input was already strict-validated in the dedicated
          # `Validate extra_vars input` step above (fail-fast before
          # tooling install). This block only assembles the optional
          # --extra-vars argv pair.
          EXTRA_VARS_ARG=()
          if [ -n "${EXTRA_VARS}" ]; then
            EXTRA_VARS_ARG=( --extra-vars "$EXTRA_VARS" )
          fi
          # No --private-key: the connection is Tailscale-SSH keyless as the
          # `provision` user (ansible_user in host_vars), authorised by the
          # tailnet ACL (tag:ci-provision -> tag:server-* as provision).
          ansible-playbook site.yml \
            --inventory inventory/hosts.yml \
            --limit "$LIMIT_TARGET" \
            "${EXTRA_VARS_ARG[@]}"
